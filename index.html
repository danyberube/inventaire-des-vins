<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Cave à Vin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-top">
        <h1>Ma Cave à Vin</h1>
        <div class="sync-controls">
          <span class="sync-indicator" id="syncIndicator">Chargement...</span>
          <button class="sync-btn" id="syncBtn" title="Rafraîchir depuis Alfred">↻</button>
          <button class="sync-btn" id="logoutBtn" title="Déconnexion">⏻</button>
          <div class="download-wrapper">
            <button class="sync-btn" id="downloadBtn" title="Télécharger l'inventaire">↓</button>
            <div class="download-menu" id="downloadMenu">
              <button data-format="csv">CSV</button>
              <button data-format="json">JSON</button>
            </div>
          </div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="search-bar">
        <input type="text" id="search" placeholder="Rechercher un vin..." autocomplete="off">
      </div>
      <div class="filters">
        <select id="filterColor">
          <option value="">Toutes les couleurs</option>
        </select>
        <select id="filterCountry">
          <option value="">Tous les pays</option>
        </select>
        <select id="filterMaturity">
          <option value="">Toutes maturités</option>
          <option value="not-ready">Pas encore prêt</option>
          <option value="ready">Prêt à boire</option>
          <option value="peak">Au pic</option>
          <option value="past">Passé le pic</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn" data-view="table" title="Vue tableau">☰</button>
          <button class="view-btn" data-view="cards" title="Vue cartes">▦</button>
        </div>
      </div>
    </section>

    <section class="results-info" id="resultsInfo"></section>

    <section class="wine-grid" id="wineGrid"></section>

    <section class="api-section" id="apiSection" style="display:none">
      <h3>Acces API</h3>
      <div class="api-url-box">
        <label>URL publique (JSON)</label>
        <div class="api-url-row">
          <input type="text" id="apiUrl" readonly>
          <button id="copyUrlBtn" title="Copier">Copier</button>
        </div>
      </div>
      <div class="api-url-box">
        <label>Cle API</label>
        <div class="api-url-row">
          <input type="text" id="apiKey" readonly>
          <button id="copyKeyBtn" title="Copier">Copier</button>
        </div>
      </div>
      <button id="rotateKeyBtn" class="rotate-btn">Regenerer la cle</button>
    </section>
  </main>

  <button class="chat-toggle" id="chatToggle" style="display:none" title="Sommelier IA">
    <span class="chat-toggle-icon">&#127863;</span>
  </button>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <h3>Sommelier IA</h3>
      <button id="chatClose" class="chat-close">&#10005;</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-bubble chat-bubble-ai">Bonjour! Decrivez-moi votre plat et je vous recommanderai un vin de votre cave.</div>
    </div>
    <form class="chat-form" id="chatForm">
      <input type="text" id="chatInput" placeholder="Decrivez votre plat..." autocomplete="off">
      <button type="submit" class="chat-send">&#10148;</button>
    </form>
  </div>

  <div class="login-overlay" id="loginScreen" style="display:none">
    <div class="login-box">
      <h2>Ma Cave à Vin</h2>
      <form id="loginForm">
        <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password" required>
        <button type="submit">Entrer</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
